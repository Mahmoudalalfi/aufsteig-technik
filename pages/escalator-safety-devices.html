<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Escalator Safety & Detection Devices | Aufsteig Technik</title>
  <meta
    name="description"
    content="Escalator safety and detection devices overview diagram for compliance and audit reference."
  />
  <link rel="icon" href="../aufsteig-logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #ececef;
      --bg-soft: #f4f4f6;
      --surface: rgba(255, 255, 255, 0.72);
      --surface-hover: rgba(255, 255, 255, 0.92);
      --glass: rgba(255, 255, 255, 0.6);
      --glass-border: rgba(18, 22, 30, 0.09);
      --ink: #111217;
      --muted: #626874;
      --accent: #2d67aa;
      --accent-soft: #3d7ed4;
      --gold: #9a7c3a;
      --gold-soft: #b5923e;
      --line: rgba(18, 22, 30, 0.07);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    .grain {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.018;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    .ambient-glow {
      position: fixed;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      filter: blur(180px);
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .ambient-glow.visible { opacity: 1; }
    .glow-1 {
      top: -18%;
      left: -8%;
      background: radial-gradient(circle, rgba(45, 103, 170, 0.1), transparent 70%);
    }
    .glow-2 {
      bottom: -10%;
      right: -10%;
      background: radial-gradient(circle, rgba(154, 124, 58, 0.07), transparent 70%);
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(1320px, 94vw);
      margin: 0 auto;
      padding: 60px 0 120px;
    }

    /* ── BACK LINK ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      backdrop-filter: blur(12px);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(12px);
    }
    .back-link:hover {
      color: var(--ink);
      border-color: rgba(18, 22, 30, 0.16);
      background: rgba(255,255,255,0.85);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(18, 30, 50, 0.1);
    }
    .back-link svg {
      width: 16px;
      height: 16px;
      transition: transform 0.3s ease;
    }
    .back-link:hover svg { transform: translateX(-3px); }

    /* ── HERO ── */
    .hero {
      margin-bottom: 80px;
    }
    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--gold);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(16px);
    }
    .hero-kicker::before {
      content: "";
      width: 28px;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
      border-radius: 2px;
    }

    .hero-title {
      font-size: clamp(2.8rem, 6.5vw, 5.2rem);
      font-weight: 900;
      letter-spacing: -0.045em;
      line-height: 1.12;
      color: var(--ink);
      max-width: 14ch;
      margin-bottom: 28px;
    }
    .hero-title .line {
      display: block;
      overflow: hidden;
      padding-bottom: 0.06em;
    }
    .hero-title .line-inner {
      display: block;
      opacity: 0;
      transform: translateY(100%);
    }
    .hero-title .accent-word {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-lead {
      max-width: 56ch;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.65;
      font-weight: 400;
      opacity: 0;
      transform: translateY(20px);
    }

    /* ── DIAGRAM CARD ── */
    .diagram-card {
      position: relative;
      border-radius: var(--radius-lg);
      border: 1px solid var(--glass-border);
      background: var(--surface);
      backdrop-filter: blur(10px);
      padding: 14px;
      overflow: hidden;
      transition: all 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      opacity: 0;
      transform: translateY(40px);
    }
    .diagram-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }
    .diagram-card:hover {
      border-color: rgba(45, 103, 170, 0.18);
      background: var(--surface-hover);
      box-shadow:
        0 24px 60px rgba(18, 30, 50, 0.1),
        0 0 0 1px rgba(255,255,255,0.5) inset;
    }

    .diagram-card img {
      position: relative;
      z-index: 2;
      width: 100%;
      display: block;
      border-radius: var(--radius-md);
      border: 1px solid rgba(18, 22, 30, 0.08);
      background: rgba(255, 255, 255, 0.7);
      transition: all 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .diagram-card img:hover {
      transform: scale(1.008) translateY(-2px);
      box-shadow: 0 20px 48px rgba(18, 30, 50, 0.12);
    }

    /* ── DIVIDER ── */
    .section-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
      margin: 60px 0;
      opacity: 0;
    }

    /* ── BOTTOM CTA ── */
    .bottom-cta {
      text-align: center;
      padding: 60px 20px;
      opacity: 0;
      transform: translateY(20px);
    }
    .bottom-cta p {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 18px;
    }
    .bottom-cta a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      border-radius: 980px;
      background: #1d1d1f;
      color: #f5f5f7;
      padding: 13px 26px;
      font-size: 0.94rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      border: none;
      transition: color 280ms ease, box-shadow 280ms ease;
    }
    .bottom-cta a::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: #f5f5f7;
      z-index: -1;
      transform: translateY(100%);
      transition: transform 380ms cubic-bezier(0.22, 1, 0.3, 1);
    }
    .bottom-cta a:hover::before { transform: translateY(0); }
    .bottom-cta a:hover { color: #1d1d1f; box-shadow: 0 6px 22px rgba(0, 0, 0, 0.18); }
    .bottom-cta a::after {
      content: '→';
      display: inline-block;
      width: 1.1em;
      text-align: center;
      font-weight: 300;
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 240ms ease 60ms, transform 300ms cubic-bezier(0.22,1,0.36,1) 40ms;
      flex-shrink: 0;
    }
    .bottom-cta a:hover::after { opacity: 1; transform: translateX(0); }

    @media (max-width: 600px) {
      .wrap { padding: 36px 0 80px; }
      .hero { margin-bottom: 50px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
      .hero-title .line-inner,
      .hero-kicker, .hero-lead, .back-link,
      .diagram-card, .section-divider, .bottom-cta {
        opacity: 1 !important;
        transform: none !important;
      }
    }
  
    /* ── Language switcher ── */
    .page-lang-switcher{position:fixed;top:18px;right:18px;z-index:999;display:flex;gap:4px;background:var(--surface);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--glass-border);border-radius:20px;padding:3px;}
    .page-lang-flag{display:block;width:28px;height:18px;border-radius:3px;overflow:hidden}.page-lang-btn{padding:4px 5px;border-radius:8px;border:none;cursor:pointer;background:transparent;opacity:.45;transition:opacity .2s,transform .2s;display:flex;align-items:center}
    .page-lang-btn.is-active{opacity:1;background:rgba(0,0,0,.08);transform:scale(1.08)}
    .page-lang-btn:hover:not(.is-active){opacity:.8;transform:scale(1.12)}

  </style>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="ambient-glow glow-1" aria-hidden="true"></div>
  <div class="ambient-glow glow-2" aria-hidden="true"></div>

  <main class="wrap">
    <div class="page-lang-switcher"><button class="page-lang-btn is-active" data-lang="en" type="button" aria-label="Switch to English"><svg class="page-lang-flag" viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="30" fill="#B22234"/><rect y="4.6" width="60" height="3.8" fill="#fff"/><rect y="9.2" width="60" height="3.8" fill="#B22234"/><rect y="13.8" width="60" height="3.8" fill="#fff"/><rect y="18.4" width="60" height="3.8" fill="#B22234"/><rect y="23" width="60" height="3.8" fill="#fff"/><rect y="27.6" width="60" height="2.4" fill="#B22234"/><rect width="24" height="16.2" fill="#3C3B6E"/></svg></button><button class="page-lang-btn" data-lang="de" type="button" aria-label="Auf Deutsch wechseln"><svg class="page-lang-flag" viewBox="0 0 5 3" xmlns="http://www.w3.org/2000/svg"><rect width="5" height="1" fill="#000"/><rect y="1" width="5" height="1" fill="#D00"/><rect y="2" width="5" height="1" fill="#FFCE00"/></svg></button></div>
    <a class="back-link" href="../index.html#servicesGrid" data-i18n="back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 3L5 8l5 5"/></svg>
      Back to Services
    </a>

    <section class="hero">
      <span class="hero-kicker" data-i18n="hero.eyebrow">Compliance Overview</span>
      <h1 class="hero-title">
        <span class="line"><span class="line-inner" data-i18n="hero.t1">Escalator Safety</span></span>
        <span class="line"><span class="line-inner" data-i18n="hero.t2">& Detection</span></span>
        <span class="line"><span class="line-inner"><span class="accent-word" data-i18n="hero.t3">Devices</span></span></span>
      </h1>
      <p class="hero-lead" data-i18n="hero.desc">
        Device map for escalator safety monitoring and detection systems used during compliance audits and technical verification.
      </p>
    </section>

    <section class="diagram-card" aria-label="Escalator safety and detection devices diagram">
      <img src="../assets/Safety%20device%20overview%20diagram.png" alt="Escalator safety and detection devices overview diagram" loading="lazy" />
    </section>

    <div class="section-divider"></div>

    <div class="bottom-cta">
      <p data-i18n="cta.text">Need compliance verification for your escalator project?</p>
      <a href="../index.html#contact" data-i18n="cta.btn">
        Start a Consultation
      </a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.16/dist/lenis.min.js"></script>
  <script>
    (() => {
      gsap.registerPlugin(ScrollTrigger);

      const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
      const coarse = matchMedia("(pointer: coarse)").matches;
      let lenis;
      if (!reduced && !coarse && window.Lenis) {
        try {
          lenis = new Lenis({
            lerp: 0.085,
            wheelMultiplier: 0.94,
            smoothWheel: true,
            autoRaf: true,
            autoResize: true,
          });
          lenis.on("scroll", ScrollTrigger.update);
          gsap.ticker.add((t) => { lenis.raf(t * 1000); });
          gsap.ticker.lagSmoothing(0);
        } catch (_) { /* fallback: native */ }
      }

      if (reduced) return;

      const ease = "power3.out";
      const easeSnap = "power4.out";

      document.querySelectorAll(".ambient-glow").forEach((g) => {
        setTimeout(() => g.classList.add("visible"), 300);
      });

      gsap.to(".back-link", { opacity: 1, y: 0, duration: 0.7, delay: 0.1, ease });
      gsap.to(".hero-kicker", { opacity: 1, y: 0, duration: 0.7, delay: 0.25, ease });

      gsap.utils.toArray(".hero-title .line-inner").forEach((el, i) => {
        gsap.to(el, {
          opacity: 1,
          y: 0,
          duration: 0.9,
          delay: 0.35 + i * 0.1,
          ease: easeSnap,
        });
      });

      gsap.to(".hero-lead", { opacity: 1, y: 0, duration: 0.8, delay: 0.7, ease });

      gsap.to(".diagram-card", {
        scrollTrigger: { trigger: ".diagram-card", start: "top 88%", once: true },
        opacity: 1,
        y: 0,
        duration: 0.85,
        ease: easeSnap,
      });

      gsap.utils.toArray(".section-divider").forEach((d) => {
        gsap.to(d, {
          scrollTrigger: { trigger: d, start: "top 88%" },
          opacity: 1, duration: 1.2, ease: "power2.out",
        });
      });

      gsap.to(".bottom-cta", {
        scrollTrigger: { trigger: ".bottom-cta", start: "top 88%" },
        opacity: 1, y: 0, duration: 0.8, ease,
      });
    })();
  </script>
<script>
(function(){
  var SK="aufsteig_sp_lang",DL="en",cL=DL;
  var T={
    en:{
      "back": "Back to Services",
      "hero.eyebrow": "Compliance Overview",
      "hero.t1": "Escalator Safety",
      "hero.t2": "& Detection",
      "hero.t3": "Devices",
      "hero.desc": "Device map for escalator safety monitoring and detection systems used during compliance audits and technical verification.",
      "cta.text": "Need compliance verification for your escalator project?",
      "cta.btn": "Start a Consultation"
    },
    de:{
      "back": "Zurück zu Dienstleistungen",
      "hero.eyebrow": "Compliance-Übersicht",
      "hero.t1": "Rolltreppensicherheit",
      "hero.t2": "& Erkennung",
      "hero.t3": "Geräte",
      "hero.desc": "Geräteübersicht für Rolltreppensicherheitsüberwachung und Erkennungssysteme, die bei Compliance-Audits und technischer Überprüfung verwendet werden.",
      "cta.text": "Benötigen Sie eine Compliance-Überprüfung für Ihr Rolltreppenprojekt?",
      "cta.btn": "Beratung starten"
    }
  };
  function t(k){var d=T[cL]||T[DL];return d[k]!==undefined?d[k]:(T[DL][k]||k)}
  function apply(l){
    if(!T[l])l=DL;cL=l;
    try{localStorage.setItem(SK,l)}catch(e){}
    document.documentElement.lang=l;
    var els=document.querySelectorAll("[data-i18n]");
    for(var i=0;i<els.length;i++){
      var el=els[i],k=el.getAttribute("data-i18n"),v=t(k);
      var svg=el.querySelector("svg");
      if(svg){var ns=el.childNodes;for(var n=0;n<ns.length;n++){if(ns[n].nodeType===3&&ns[n].textContent.trim()){ns[n].textContent=" "+v+" ";break}}continue}
      el.textContent=v;
    }
    var bs=document.querySelectorAll("[data-lang]");
    for(var b=0;b<bs.length;b++)bs[b].classList.toggle("is-active",bs[b].getAttribute("data-lang")===l);
  }
  function boot(){
    var bs=document.querySelectorAll("[data-lang]");
    for(var i=0;i<bs.length;i++)bs[i].addEventListener("click",function(){apply(this.getAttribute("data-lang"))});
    var s=DL;try{s=localStorage.getItem(SK)||DL}catch(e){}
    if(T[s])apply(s);
  }
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",boot);else boot();
})();
</script>
</body>
</html>
